<div class="row">
  <div class="col-md-6 mx-auto">
    <div class="card">
      <div class="card-header">
        <h4>Add New Pokemon</h4>
      </div>
      <div class="card-body">
        <form (ngSubmit)="onSubmit()">
          <div class="mb-3">
            <label for="name" class="form-label">Name</label>
            <input type="text" class="form-control" id="name" [(ngModel)]="name" name="name" required>
          </div>

          <div class="mb-3">
            <label for="imageUrl" class="form-label">Image URL</label>
            <input type="text" class="form-control" id="imageUrl" [(ngModel)]="imageUrl" name="imageUrl" placeholder="https://example.com/pokemon.png" required>
          </div>

          <div class="mb-3">
            <label class="form-label">Types</label>
            <div class="type-selector">
              @for (type of pokemonTypes; track type) {
                <div class="type-option">
                  <label [style.background-color]="getTypeColor(type)" class="type-label">
                    <input type="checkbox" (change)="onTypeChange(type, $event)" [value]="type">
                    {{ type }}
                  </label>
                </div>
              }
            </div>
          </div>

          <button type="submit" class="btn btn-primary w-100">Add Pokemon</button>
          <button type="button" class="btn btn-secondary w-100 mt-2" (click)="cancel()">Cancel</button>
        </form>
      </div>
    </div>
  </div>
</div>
